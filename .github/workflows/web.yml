name: web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: 5.0.1

      - name: Configure
        run: emcmake cmake --preset web-debug

      - name: Build
        run: cmake --build --preset web-debug

      - name: Stage Pages files
        run: |
          BuildDir=out/build/web-debug
          PagesDir=out/pages/web-debug
          rm -rf "$PagesDir"
          mkdir -p "$PagesDir"
          cp "$BuildDir/Zeliard.html" "$PagesDir/index.html"
          cp "$BuildDir/Zeliard.js" "$PagesDir/"
          cp "$BuildDir/Zeliard.wasm" "$PagesDir/"
          cp "$BuildDir/Zeliard.data" "$PagesDir/"
          for SupportFile in "$BuildDir"/Zeliard.*; do
            FileName=$(basename "$SupportFile")
            case "$FileName" in
              Zeliard.html|Zeliard.js|Zeliard.wasm|Zeliard.data)
                continue
                ;;
            esac
            cp "$SupportFile" "$PagesDir/"
          done
          touch "$PagesDir/.nojekyll"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/pages/web-debug

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
