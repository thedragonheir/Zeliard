<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zeliard Web Build</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      color: #ddd;
      font-family: sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    #frame {
      display: grid;
      gap: 12px;
      justify-items: center;
      padding: 24px;
    }

    canvas {
      width: min(100vw, 960px);
      height: auto;
      aspect-ratio: 16 / 10;
      border: 1px solid #444;
      background: #000;
    }

    p {
      margin: 0;
      max-width: 60ch;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="frame">
    <canvas id="canvas" tabindex="-1"></canvas>
    <p>
      Zeliard C++ Web Build<br>
      C++23 + SDL3 port running in WebAssembly.
    </p>
  </div>

  <script>
    var Module = {
      canvas: document.getElementById("canvas")
    };
  </script>
  <script async src="Zeliard.js"></script>
</body>
</html>
